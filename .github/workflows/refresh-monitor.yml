name: Refresh Macro Monitor

on:
  workflow_dispatch:
  schedule:
    # 08:30 Asia/Shanghai = 00:30 UTC
    - cron: "30 0 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-macro-monitor
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      APP_ENV: production
      REQUEST_TIMEOUT: "15"
      DUCKDB_PATH: data/processed/global_macro.duckdb
      ECB_API_BASE: https://data-api.ecb.europa.eu/service/data
      EUROSTAT_API_BASE: https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data
      OECD_API_BASE: https://sdmx.oecd.org/public/rest/data
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Refresh monitor data
        run: python main.py refresh-monitor

      - name: Run tests
        run: pytest

      - name: Commit refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed data/raw/api data/raw/consensus data/raw/fred
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Automated monitor refresh"
          git push
